<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="692" height="504" font-family="Sans-Serif">
<style>
  .sg-bg { fill: #FFFFFF; }
  .sg-text { fill: #2D3436; }
  .sg-edge { stroke: #7B8894; }
  .sg-arrow { fill: #7B8894; }
  .sg-node-box { fill: #FFFFFF; stroke: #DEE2E6; }
  @media (prefers-color-scheme: dark) {
    .sg-bg { fill: #1a1a2e; }
    .sg-text { fill: #E0E0E0; }
    .sg-edge { stroke: #9CA3AF; }
    .sg-arrow { fill: #9CA3AF; }
    .sg-node-box { fill: #2a2a3e; stroke: #4A5568; }
    .sg-container-cloud { fill: #1e1e32; stroke: #4A90D9; }
    .sg-container-vpc { fill: #1e1530; stroke: #A855F7; }
    .sg-container-subnet { fill: #1a2e1a; stroke: #8BC34A; }
    .sg-container-sg { fill: #2e1a1a; stroke: #EF5350; }
    .sg-container-default { fill: #1e1e2e; stroke: #6B7280; }
    .sg-label-cloud { fill: #4A90D9; }
    .sg-label-vpc { fill: #C084FC; }
    .sg-label-subnet { fill: #8BC34A; }
    .sg-label-sg { fill: #EF5350; }
    .sg-label-default { fill: #9CA3AF; }
  }
</style>
<rect class="sg-bg" width="692" height="504" fill="#FFFFFF"/>
<defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon class="sg-arrow" points="0 0, 10 3.5, 0 7" fill="#7B8894"/></marker></defs>
<rect class="sg-container-cloud" x="40" y="40" width="592" height="404" rx="8" fill="#FFFFFF" stroke="#232F3E" stroke-width="2"/>
<image href="data:image/png;base64," x="48" y="44" width="24" height="24"/>
<text class="sg-label-cloud" x="78" y="62" font-size="13" font-weight="600" fill="#232F3E">AWS Cloud</text>
<rect class="sg-container-vpc" x="60" y="90" width="552" height="334" rx="8" fill="#F8F4FF" stroke="#8C4FFF" stroke-width="2"/>
<image href="data:image/png;base64," x="68" y="94" width="24" height="24"/>
<text class="sg-label-vpc" x="98" y="112" font-size="13" font-weight="600" fill="#6B21A8">VPC — main</text>
<rect class="sg-container-subnet" x="80" y="140" width="292" height="264" rx="8" fill="#F2F7EE" stroke="#7CB342" stroke-width="2"/>
<image href="data:image/png;base64," x="88" y="144" width="24" height="24"/>
<text class="sg-label-subnet" x="118" y="162" font-size="13" font-weight="600" fill="#558B2F">Subnet — public</text>
<rect class="sg-container-subnet" x="392" y="222" width="200" height="100" rx="8" fill="#F2F7EE" stroke="#7CB342" stroke-width="2"/>
<image href="data:image/png;base64," x="400" y="226" width="24" height="24"/>
<text class="sg-label-subnet" x="430" y="244" font-size="13" font-weight="600" fill="#558B2F">Subnet — private</text>
<rect class="sg-container-sg" x="100" y="190" width="252" height="194" rx="8" fill="#FFF5F5" stroke="#E53935" stroke-width="2" stroke-dasharray="6,3"/>
<image href="data:image/png;base64," x="108" y="194" width="24" height="24"/>
<text class="sg-label-sg" x="138" y="212" font-size="13" font-weight="600" fill="#C62828">Security Group — web</text>
<image href="data:image/png;base64," x="136" y="256" width="64" height="64"/>
<text class="sg-text" x="168" y="336" text-anchor="middle" font-size="11" fill="#2D3436">EC2</text>
<text class="sg-text" x="168" y="350" text-anchor="middle" font-size="11" fill="#2D3436">web_a</text>
<image href="data:image/png;base64," x="252" y="256" width="64" height="64"/>
<text class="sg-text" x="284" y="336" text-anchor="middle" font-size="11" fill="#2D3436">EC2</text>
<text class="sg-text" x="284" y="350" text-anchor="middle" font-size="11" fill="#2D3436">web_b</text>
</svg>
